name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, feat/curator-portal ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"
        uv pip install --system pytest pytest-asyncio httpx

    - name: Create test database
      run: |
        mkdir -p data
        python -c "from rnudb_utils.database import create_database; create_database()"

    - name: Run backend tests
      run: |
        python -m pytest tests/ -v --tb=short --color=yes
      env:
        JWT_SECRET_KEY: test-secret-key-for-ci-only
        GITHUB_CLIENT_ID: test-client-id
        GITHUB_CLIENT_SECRET: test-client-secret
        FRONTEND_URL: http://localhost:5173

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Check for build errors
      run: |
        if [ $? -ne 0 ]; then
          echo "Frontend build failed!"
          exit 1
        fi

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npx eslint src/ --ext .ts,.tsx --max-warnings 50 || true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Create test database with sample data
      run: |
        mkdir -p data
        python -c "from rnudb_utils.database import create_database; create_database()"

    - name: Run integration tests
      run: |
        python -m pytest tests/ -v -k "integration or end_to_end" --tb=short || true
      env:
        JWT_SECRET_KEY: test-secret-key-for-ci-only
        GITHUB_CLIENT_ID: test-client-id
        GITHUB_CLIENT_SECRET: test-client-secret
        FRONTEND_URL: http://localhost:5173
